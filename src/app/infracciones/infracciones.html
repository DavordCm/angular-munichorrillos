<div class="page-container">
  <div class="page-card">
    <div class="page-header">
      <h1 class="page-title">Mantenimiento de Ordenanzas Municipales</h1>
      <button class="btn-back" (click)="volverAlMenu()">
        <span class="material-icons">arrow_back</span>
      </button>
    </div>

    <button class="btn-add" (click)="toggleForm()">
      <span class="material-icons">add</span>
      AGREGAR
    </button>

    <!-- Search -->
    <div class="search-bar" style="margin-top:16px;">
      <input type="text" placeholder="Buscar por UID de infraccion..." [(ngModel)]="busquedaUid">
      <button class="btn-search" (click)="buscarInfraccion()">Buscar</button>
    </div>

    <!-- Inline form -->
    <div *ngIf="showForm" class="form-inline" style="margin-top:16px;">
      <input type="text" placeholder="Codigo" [(ngModel)]="nuevaInfraccion.codInfraccion">
      <input type="text" placeholder="Ordenanza" [(ngModel)]="nuevaInfraccion.nomInfraccion">
      <input type="text" placeholder="Descripcion" [(ngModel)]="nuevaInfraccion.descripcion">
      <input type="text" placeholder="Resolucion" [(ngModel)]="nuevaInfraccion.resolucion">
      <input type="text" placeholder="Rango" [(ngModel)]="nuevaInfraccion.rango">
      <input type="number" placeholder="Monto" [(ngModel)]="nuevaInfraccion.monto">
      <button class="btn-add" (click)="guardarInfraccion()">
        {{ editarId ? 'ACTUALIZAR' : 'GUARDAR' }}
      </button>
    </div>

    <table class="data-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Ordenanza</th>
          <th>Descripcion</th>
          <th>Resolucion</th>
          <th>Rango</th>
          <th>Monto</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let inf of infracciones; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ inf.nomInfraccion }}</td>
          <td>{{ inf.descripcion }}</td>
          <td>{{ inf.resolucion }}</td>
          <td>{{ inf.rango }}</td>
          <td>S/ {{ inf.monto }}</td>
          <td>
            <div class="actions-cell">
              <button class="btn-action update" (click)="editarInfraccion(inf)">ACTUALIZAR</button>
              <button class="btn-action remove" (click)="eliminarInfraccion(inf.id)">ELIMINAR</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
