<div class="page-container">
  <div class="page-card">
    <div class="page-header">
      <h1 class="page-title">Mantenimiento de Infractores</h1>
      <button class="btn-back" (click)="volverAMenu()">
        <span class="material-icons">arrow_back</span>
      </button>
    </div>

    <button class="btn-add" (click)="toggleForm()">
      <span class="material-icons">add</span>
      AGREGAR INFRACTOR
    </button>

    <!-- Search -->
    <div class="search-bar" style="margin-top:16px;">
      <input type="text" placeholder="Buscar por UID del infractor..." [(ngModel)]="busquedaUid">
      <button class="btn-search" (click)="buscarInfractor()">Buscar</button>
    </div>

    <!-- Inline form -->
    <div *ngIf="showForm" class="form-inline" style="margin-top:16px;">
      <input type="text" placeholder="DNI" [(ngModel)]="nuevoInfractor.dniInfractor">
      <input type="text" placeholder="Nombres" [(ngModel)]="nuevoInfractor.nombres">
      <input type="text" placeholder="Apellidos" [(ngModel)]="nuevoInfractor.apellidos">
      <input type="text" placeholder="Direccion" [(ngModel)]="nuevoInfractor.direccion">
      <input type="text" placeholder="Telefono" [(ngModel)]="nuevoInfractor.telefono">
      <input type="email" placeholder="Email" [(ngModel)]="nuevoInfractor.email">
      <input type="password" placeholder="Password" [(ngModel)]="nuevoInfractor.password">
      <button class="btn-add" (click)="guardarInfractor()">
        {{ editarUid ? 'ACTUALIZAR' : 'GUARDAR' }}
      </button>
    </div>

    <table class="data-table">
      <thead>
        <tr>
          <th>DNI</th>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Direccion</th>
          <th>Telefono</th>
          <th>Email</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let infractor of infractores">
          <td>{{ infractor.dniInfractor }}</td>
          <td>{{ infractor.nombres }}</td>
          <td>{{ infractor.apellidos }}</td>
          <td>{{ infractor.direccion }}</td>
          <td>{{ infractor.telefono }}</td>
          <td>{{ infractor.email }}</td>
          <td>
            <div class="actions-cell">
              <button class="btn-icon edit" (click)="editarInfractor(infractor)">
                <span class="material-icons">edit</span>
              </button>
              <button class="btn-icon delete" (click)="eliminarInfractor(infractor.id)">
                <span class="material-icons">delete</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
